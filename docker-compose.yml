services:
  db:
    image: postgres:16
    container_name: fleetcommand-db
    environment:
      POSTGRES_DB: fleetcommand
      POSTGRES_USER: fleet
      POSTGRES_PASSWORD: fleetpass
    ports:
      - "5432:5432"
    volumes:
      - fleetcommand_pgdata:/var/lib/postgresql/data

volumes:
  fleetcommand_pgdata:
